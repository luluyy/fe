<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Render Basics Lab</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 920px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      h1, h2 {
        margin: 0 0 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      input {
        flex: 1;
        min-width: 220px;
        background: #0f172a;
        color: #e5e7eb;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px;
      }
      button {
        border: 1px solid #374151;
        background: #1f2937;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }
      button:hover {
        background: #374151;
      }
      ul {
        margin: 0;
        padding-left: 20px;
      }
      li {
        margin: 8px 0;
      }
      .meta {
        font-size: 12px;
        color: #94a3b8;
      }
      code {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>count: </h1>
      <button id="btn"></button>
    </div>

    <script defer src="./base.js"></script>

  </body>
</html>
