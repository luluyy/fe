<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D / Canvas 科技风</title>
    <style>
      body { margin: 0; overflow: hidden; background: #050812; color: #dbeafe; font-family: "Segoe UI", sans-serif; }
      canvas { position: fixed; inset: 0; }
      .overlay { position: relative; z-index: 1; min-height: 100vh; display: grid; place-items: center; padding: 20px; }
      .card {
        width: min(780px, 92vw);
        padding: 24px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(15,23,42,.72), rgba(30,41,59,.5));
        border: 1px solid rgba(147,197,253,.35);
        backdrop-filter: blur(8px);
        transform-style: preserve-3d;
        animation: float 6s ease-in-out infinite;
        box-shadow: 0 20px 70px rgba(30,64,175,.3);
      }
      h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 52px); }
      p { color: #bfdbfe; line-height: 1.6; }
      a { color: #93c5fd; }
      .badge { font-size: 12px; letter-spacing: .8px; color: #7dd3fc; text-transform: uppercase; }
      @keyframes float { 0%,100% { transform: translateY(0) rotateX(3deg);} 50% { transform: translateY(-12px) rotateX(-3deg);} }
    </style>
  </head>
  <body>
    <canvas id="bg"></canvas>
    <div class="overlay">
      <section class="card">
        <div class="badge">3D / Canvas Tech Blog</div>
        <h1>Next.js Performance Atlas</h1>
        <p>把博客做成科技感展示面：粒子星场背景 + 玻璃拟态卡片 + 轻 3D 浮动。适合放你的 RSC、Hydration、性能优化代表作。</p>
        <p><a href="../">返回风格入口</a></p>
      </section>
    </div>
    <script>
      const canvas = document.getElementById("bg");
      const ctx = canvas.getContext("2d");
      const stars = [];
      const count = 160;
      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
      }
      function seed() {
        stars.length = 0;
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            z: Math.random() * 1 + 0.2,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4
          });
        }
      }
      function draw() {
        ctx.fillStyle = "rgba(5,8,18,0.55)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
          s.x += s.vx * s.z;
          s.y += s.vy * s.z;
          if (s.x < 0 || s.x > canvas.width || s.y < 0 || s.y > canvas.height) {
            s.x = Math.random() * canvas.width;
            s.y = Math.random() * canvas.height;
          }
          ctx.beginPath();
          ctx.fillStyle = `rgba(125,211,252,${0.35 + s.z * 0.45})`;
          ctx.arc(s.x, s.y, 1.2 + s.z * 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      addEventListener("resize", () => { resize(); seed(); });
      resize();
      seed();
      draw();
    </script>
  </body>
  </html>
